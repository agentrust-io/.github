name: "Contributor Reputation Check"
description: >
  Screens GitHub contributors for account-shape anomalies, cross-repo
  credential laundering, and coordination patterns. Public comments are
  AgentTrust-branded; risk checks delegate to pinned
  microsoft/agent-governance-toolkit scripts (MIT License).

inputs:
  github-token:
    description: "GitHub token with issues:write and pull-requests:write"
    required: true
  checks:
    description: "Comma-separated checks to run: profile, credential, cluster"
    required: false
    default: "profile,credential"
  target-repo:
    description: "Repository for credential audit (owner/repo). Defaults to current repo."
    required: false
    default: ""
  risk-threshold:
    description: "Minimum risk to comment/label: MEDIUM or HIGH"
    required: false
    default: "MEDIUM"

outputs:
  risk:
    description: "Overall risk level: LOW, MEDIUM, HIGH, or UNKNOWN"
    value: ${{ steps.run.outputs.risk }}
  profile-risk:
    description: "Profile analysis risk level"
    value: ${{ steps.run.outputs.profile-risk }}
  credential-risk:
    description: "Credential audit risk level"
    value: ${{ steps.run.outputs.credential-risk }}
  cluster-risk:
    description: "Cluster detection risk level (empty if not run)"
    value: ${{ steps.run.outputs.cluster-risk }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: "3.12"

    - name: Checkout AGT scripts
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: microsoft/agent-governance-toolkit
        ref: 410fb2ccf2bd9ff74ea2d67450f018316efb0556
        persist-credentials: false
        sparse-checkout: scripts
        path: _agt

    - name: Resolve inputs
      id: inputs
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_USER_LOGIN: ${{ github.event.pull_request.user.login }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        ISSUE_USER_LOGIN: ${{ github.event.issue.user.login }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        DISPATCH_USERNAME: ${{ github.event.inputs.username || '' }}
        INPUT_TARGET_REPO: ${{ inputs.target-repo }}
        REPOSITORY: ${{ github.repository }}
      run: |
        username=""
        number="0"
        type="manual"

        if [ "$EVENT_NAME" = "pull_request_target" ] || [ "$EVENT_NAME" = "pull_request" ]; then
          username="$PR_USER_LOGIN"
          number="$PR_NUMBER"
          type="pr"
        elif [ "$EVENT_NAME" = "issues" ]; then
          username="$ISSUE_USER_LOGIN"
          number="$ISSUE_NUMBER"
          type="issue"
        elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
          username="$DISPATCH_USERNAME"
          type="manual"
        fi

        echo "username=$username" >> "$GITHUB_OUTPUT"
        echo "number=$number" >> "$GITHUB_OUTPUT"
        echo "type=$type" >> "$GITHUB_OUTPUT"

        target="$INPUT_TARGET_REPO"
        if [ -z "$target" ]; then
          target="$REPOSITORY"
        fi
        echo "target_repo=$target" >> "$GITHUB_OUTPUT"

    - name: Run contributor check
      id: run
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        STEP_USERNAME: ${{ steps.inputs.outputs.username }}
        STEP_NUMBER: ${{ steps.inputs.outputs.number }}
        STEP_TYPE: ${{ steps.inputs.outputs.type }}
        STEP_TARGET_REPO: ${{ steps.inputs.outputs.target_repo }}
        INPUT_CHECKS: ${{ inputs.checks }}
        INPUT_RISK_THRESHOLD: ${{ inputs.risk-threshold }}
      run: |
        python "_agt/scripts/contributor_check_action.py" \
          --username "$STEP_USERNAME" \
          --checks "$INPUT_CHECKS" \
          --target-repo "$STEP_TARGET_REPO" \
          --risk-threshold "$INPUT_RISK_THRESHOLD" \
          --number "$STEP_NUMBER" \
          --item-type "$STEP_TYPE"

    - name: Apply AgentTrust comment branding
      if: ${{ steps.inputs.outputs.type != 'manual' && steps.inputs.outputs.number != '0' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        STEP_NUMBER: ${{ steps.inputs.outputs.number }}
        STEP_TYPE: ${{ steps.inputs.outputs.type }}
        STEP_TARGET_REPO: ${{ steps.inputs.outputs.target_repo }}
      run: |
        python "${{ github.action_path }}/brand_comment.py" \
          --github-token "$GITHUB_TOKEN" \
          --target-repo "$STEP_TARGET_REPO" \
          --number "$STEP_NUMBER" \
          --item-type "$STEP_TYPE"

    - name: Cleanup
      if: always()
      shell: bash
      run: |
        rm -rf _agt
        rm -f /tmp/agt-profile.json /tmp/agt-profile.log
        rm -f /tmp/agt-cred.json /tmp/agt-cred.log
        rm -f /tmp/agt-cluster.json /tmp/agt-cluster.log
